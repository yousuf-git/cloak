<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cloak logo">
  <defs>
    <linearGradient id="clk-bg" x1="14" y1="8" x2="106" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <radialGradient id="clk-glow" cx="0.5" cy="0.26" r="0.8">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="clk-fg" x1="60" y1="22" x2="60" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6EAFF"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#clk-bg)"/>
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#clk-glow)"/>

  <!-- Cloak / hood: an open-bottom arch that drapes into two panels -->
  <path d="M31 98 C31 47 43 24 60 24 C77 24 89 47 89 98"
        stroke="url(#clk-fg)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Inner fold, hinting at the drape -->
  <path d="M45 96 C45 60 49 41 57 33"
        stroke="#C7CEFF" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M75 96 C75 60 71 41 63 33"
        stroke="#C7CEFF" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Keyhole concealed within the cloak: the guarded secret -->
  <circle cx="60" cy="60" r="10.5" fill="url(#clk-fg)"/>
  <path d="M54 65 H66 L62.6 86 C62.6 87.4 61.4 88.5 60 88.5 C58.6 88.5 57.4 87.4 57.4 86 Z" fill="url(#clk-fg)"/>
</svg>
